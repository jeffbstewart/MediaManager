# Android TV signing configuration.
# Copy to secrets/android-tv-signing.properties and fill in values.
# Generate a keystore with:
#   keytool -genkeypair -v -keystore secrets/android-tv-keystore.jks \
#     -keyalg RSA -keysize 2048 -validity 10000 -alias mediamanager-tv

storeFile=../secrets/android-tv-keystore.jks
storePassword=
keyAlias=mediamanager-tv
keyPassword=
