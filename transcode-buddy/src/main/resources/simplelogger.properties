# SLF4J Simple Logger configuration for transcode buddy.
# Logs to a file so javaw (no console) can be used, preventing
# ffmpeg/whisper child processes from emitting console beeps.
org.slf4j.simpleLogger.logFile=../data/buddy.log
org.slf4j.simpleLogger.showDateTime=true
org.slf4j.simpleLogger.dateTimeFormat=yyyy-MM-dd HH:mm:ss.SSS
org.slf4j.simpleLogger.showThreadName=true
org.slf4j.simpleLogger.showShortLogName=true
