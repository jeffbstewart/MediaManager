# Transcode Buddy configuration.
# Copy to buddy.properties and fill in your values.
# buddy.properties is gitignored and should never be committed.

# ── Required ─────────────────────────────────────────────────────────

# mediaManager server URL (no trailing slash).
server_url=http://your-server:8080

# API key from Settings > Transcode Buddy > Buddy API Key.
api_key=your-buddy-api-key-from-settings

# Name for this worker (shown in the server UI).
buddy_name=my-worker

# Local path to the NAS mount (the same files the server sees).
# Windows UNC: \\\\NAS\\PlexServedMedia\\media
# Linux mount: /mnt/nas/media
nas_root=\\\\NAS\\PlexServedMedia\\media

# ── FFmpeg ───────────────────────────────────────────────────────────

ffmpeg_path=C:\\ProgramData\\chocolatey\\bin\\ffmpeg.exe
ffprobe_path=C:\\ProgramData\\chocolatey\\bin\\ffprobe.exe

# ── gRPC transport (optional) ────────────────────────────────────────
# By default both are derived from server_url: host+port from the URL,
# TLS on iff the URL is https. Uncomment to override.
# grpc_address=your-server:9090
# grpc_use_tls=false

# ── Workers and polling ──────────────────────────────────────────────

# Concurrent transcode workers. Clamped to [1, 16]. Default: 1.
worker_count=1

# First-available-wins encoder order. Options: nvenc, qsv, cpu.
encoder_preference=nvenc,qsv,cpu

# Seconds between polls for new work. Minimum 5. Default 30.
poll_interval_seconds=30

# Seconds between progress reports to the server. Minimum 5. Default 15.
progress_interval_seconds=15

# ── Whisper subtitle generation (optional) ───────────────────────────
# If whisper_path is unset, the buddy won't do subtitle passes.

whisper_path=C:\\whisper\\faster-whisper-xxl.exe
whisper_model=large-v3-turbo
# whisper_model_dir=C:\\whisper\\models
# whisper_language=en
# whisper_device=cuda
# whisper_compute_type=float16

# ── Local staging (optional) ─────────────────────────────────────────
# Dedicated temp dir for staging source files locally before bundle
# processing. Leave unset to disable local caching.
# local_temp_dir=C:\\buddy-temp

# ── Status page ──────────────────────────────────────────────────────

# Port for the local status HTTP server (http://localhost:<port>/status).
status_port=8090

# ── Binnacle log export (optional) ───────────────────────────────────
# Both keys must be set to enable. Use the same endpoint and API key
# as the server (BINNACLE_ENDPOINT / BINNACLE_API_KEY in secrets/.env).
# Logs appear in Binnacle with service.name = mediamanager-buddy.
# binnacle_endpoint=http://your-binnacle-host:4318
# binnacle_api_key=your-binnacle-write-key
