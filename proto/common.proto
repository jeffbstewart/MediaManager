syntax = "proto3";

package mediamanager;

option java_package = "net.stewart.mediamanager.grpc";
option java_multiple_files = true;
option swift_prefix = "MM";

import "time.proto";

// ============================================================================
// Shared enums
// ============================================================================

enum MediaType {
  MEDIA_TYPE_UNKNOWN = 0;
  MEDIA_TYPE_MOVIE = 1;
  MEDIA_TYPE_TV = 2;
  MEDIA_TYPE_PERSONAL = 3;
  MEDIA_TYPE_BOOK = 4;
  MEDIA_TYPE_ALBUM = 5;
}

// Content ratings. TV and movie ratings occupy separate ranges so they
// can be compared within their own system but never accidentally mixed.
// For cross-system restrictiveness comparison, use RatingLevel instead.
enum ContentRating {
  CONTENT_RATING_UNKNOWN = 0;

  // MPAA movie ratings (100–199)
  CONTENT_RATING_G = 100;
  CONTENT_RATING_PG = 101;
  CONTENT_RATING_PG_13 = 102;
  CONTENT_RATING_R = 103;
  CONTENT_RATING_NC_17 = 104;

  // US TV ratings (200–299)
  CONTENT_RATING_TV_Y = 200;
  CONTENT_RATING_TV_Y7 = 201;
  CONTENT_RATING_TV_G = 202;
  CONTENT_RATING_TV_PG = 203;
  CONTENT_RATING_TV_14 = 204;
  CONTENT_RATING_TV_MA = 205;

  // Catch-all for ratings not in the above lists
  CONTENT_RATING_NR = 300;
}

// Unified restrictiveness tier for cross-system comparison. The server maps
// each ContentRating to a RatingLevel. Used for user rating ceilings —
// comparison is simply: mapped_level <= user_ceiling.
//
// Mapping:
//   CHILDREN → G, TV-Y, TV-Y7, TV-G
//   GENERAL  → PG, TV-PG
//   TEEN     → PG-13, TV-14
//   MATURE   → R, TV-MA
//   ADULT    → NC-17
enum RatingLevel {
  RATING_LEVEL_UNKNOWN = 0;
  RATING_LEVEL_CHILDREN = 1;
  RATING_LEVEL_GENERAL = 2;
  RATING_LEVEL_TEEN = 3;
  RATING_LEVEL_MATURE = 4;
  RATING_LEVEL_ADULT = 5;
}

enum MediaFormat {
  MEDIA_FORMAT_UNKNOWN = 0;
  MEDIA_FORMAT_DVD = 1;
  MEDIA_FORMAT_BLURAY = 2;
  MEDIA_FORMAT_UHD_BLURAY = 3;
  MEDIA_FORMAT_HD_DVD = 4;
}

// Video quality tier. Derived from MediaFormat on the server:
// DVD → SD, BLURAY/HD_DVD → FHD, UHD_BLURAY → UHD.
// Low-storage transcodes are always FHD (re-encoded to 1080p).
enum Quality {
  QUALITY_UNKNOWN = 0;
  QUALITY_SD = 1;       // 480p (DVD source)
  QUALITY_FHD = 2;      // 1080p (Blu-ray, HD DVD source)
  QUALITY_UHD = 3;      // 2160p (UHD Blu-ray source)
}

enum SearchResultType {
  SEARCH_RESULT_TYPE_UNKNOWN = 0;
  SEARCH_RESULT_TYPE_MOVIE = 1;
  SEARCH_RESULT_TYPE_SERIES = 2;
  SEARCH_RESULT_TYPE_ACTOR = 3;
  SEARCH_RESULT_TYPE_COLLECTION = 4;
  SEARCH_RESULT_TYPE_TAG = 5;
  SEARCH_RESULT_TYPE_GENRE = 6;
  SEARCH_RESULT_TYPE_BOOK = 7;
  SEARCH_RESULT_TYPE_ALBUM = 8;
  SEARCH_RESULT_TYPE_ARTIST = 9;
  SEARCH_RESULT_TYPE_AUTHOR = 10;
  SEARCH_RESULT_TYPE_TRACK = 11;
}

// MusicBrainz artist-type taxonomy. Mirrors the Kotlin ArtistType enum.
enum ArtistType {
  ARTIST_TYPE_UNKNOWN = 0;
  ARTIST_TYPE_PERSON = 1;
  ARTIST_TYPE_GROUP = 2;
  ARTIST_TYPE_ORCHESTRA = 3;
  ARTIST_TYPE_CHOIR = 4;
  ARTIST_TYPE_OTHER = 5;
}

// MusicBrainz release-group type for unowned discography entries.
enum ReleaseGroupType {
  RELEASE_GROUP_TYPE_UNKNOWN = 0;
  RELEASE_GROUP_TYPE_ALBUM = 1;
  RELEASE_GROUP_TYPE_EP = 2;
  RELEASE_GROUP_TYPE_SINGLE = 3;
  RELEASE_GROUP_TYPE_COMPILATION = 4;
  RELEASE_GROUP_TYPE_SOUNDTRACK = 5;
  RELEASE_GROUP_TYPE_LIVE = 6;
  RELEASE_GROUP_TYPE_REMIX = 7;
  RELEASE_GROUP_TYPE_OTHER = 8;
}

// Digital + physical book edition formats.
enum BookEditionFormat {
  BOOK_EDITION_FORMAT_UNKNOWN = 0;
  BOOK_EDITION_FORMAT_EBOOK_EPUB = 1;
  BOOK_EDITION_FORMAT_EBOOK_PDF = 2;
  BOOK_EDITION_FORMAT_AUDIOBOOK_DIGITAL = 3;
  BOOK_EDITION_FORMAT_PAPERBACK = 4;
  BOOK_EDITION_FORMAT_HARDCOVER = 5;
}

// User access level / role.
enum AccessLevel {
  ACCESS_LEVEL_UNKNOWN = 0;
  ACCESS_LEVEL_VIEWER = 1;   // Level 1: catalog, playback, search
  ACCESS_LEVEL_ADMIN = 2;    // Level 2: full admin access
}

// Acquisition status for purchase wishes.
enum AcquisitionStatus {
  ACQUISITION_STATUS_UNKNOWN = 0;
  ACQUISITION_STATUS_NOT_AVAILABLE = 1;
  ACQUISITION_STATUS_REJECTED = 2;
  ACQUISITION_STATUS_ORDERED = 3;
  ACQUISITION_STATUS_OWNED = 4;
  ACQUISITION_STATUS_NEEDS_ASSISTANCE = 5;
}

// User-facing lifecycle stage for a wishlist item. This is derived on the
// server from acquisition decision + physical ownership + NAS link + desktop
// playability, and is intentionally separate from admin acquisition status.
enum WishLifecycleStage {
  WISH_LIFECYCLE_STAGE_UNKNOWN = 0;
  WISH_LIFECYCLE_STAGE_WISHED_FOR = 1;
  WISH_LIFECYCLE_STAGE_NOT_FEASIBLE = 2;
  WISH_LIFECYCLE_STAGE_WONT_ORDER = 3;
  WISH_LIFECYCLE_STAGE_NEEDS_ASSISTANCE = 4;
  WISH_LIFECYCLE_STAGE_ORDERED = 5;
  WISH_LIFECYCLE_STAGE_IN_HOUSE_PENDING_NAS = 6;
  WISH_LIFECYCLE_STAGE_ON_NAS_PENDING_DESKTOP = 7;
  WISH_LIFECYCLE_STAGE_READY_TO_WATCH = 8;
}

// ============================================================================
// Shared scalar types
// ============================================================================

message Empty {}

// Shared ID wrapper requests — used by multiple services.
message TitleIdRequest {
  int64 title_id = 1;
}

message TranscodeIdRequest {
  int64 transcode_id = 1;
}

message TagIdRequest {
  int64 tag_id = 1;
}

message TagTitleRequest {
  int64 tag_id = 1;
  int64 title_id = 2;
}

message GenreIdRequest {
  int64 genre_id = 1;
}

// CSS hex color. The string includes the leading '#' and uses uppercase hex,
// e.g. "#FF5733", "#2196F3". Always exactly 7 characters (#RRGGBB).
message Color {
  string hex = 1;
}

// ============================================================================
// Pagination
// ============================================================================

message PaginationRequest {
  int32 page = 1;   // 1-based
  int32 limit = 2;  // max items per page
}

message PaginationInfo {
  int32 total = 1;
  int32 page = 2;
  int32 limit = 3;
  int32 total_pages = 4;
}

// ============================================================================
// Catalog types
// ============================================================================

message Title {
  int64 id = 1;
  string name = 2;
  MediaType media_type = 3;
  optional int32 year = 4;
  optional string description = 5;
  optional string poster_url = 6;
  optional string backdrop_url = 7;
  ContentRating content_rating = 8;
  optional double popularity = 9;
  Quality quality = 10;
  bool playable = 11;
  optional int64 transcode_id = 12;
  optional int32 tmdb_id = 13;
  optional int32 tmdb_collection_id = 14;
  optional string tmdb_collection_name = 15;
  repeated string family_members = 16;
  bool high_quality_transcode_available = 17;
  bool low_storage_transcode_available = 18;

  // Populated only in "Resume Playing" carousel items
  optional PlaybackOffset resume_position = 19;
  optional PlaybackOffset resume_duration = 20;
  optional int32 resume_season_number = 21;
  optional int32 resume_episode_number = 22;
  optional string resume_episode_name = 23;
}

// Full title detail. Embeds Title to avoid field duplication, then adds
// detail-only fields (cast, genres, tags, transcodes, user flags, etc.).
message TitleDetail {
  Title title = 1;
  repeated CastMember cast = 2;
  repeated Genre genres = 3;
  repeated Tag tags = 4;
  repeated Transcode transcodes = 5;
  optional PlaybackProgress playback_progress = 6;
  bool is_favorite = 7;
  bool is_hidden = 8;
  bool wished = 9;
  // Populated only when title.media_type = MEDIA_TYPE_ALBUM.
  optional Album album = 10;
  // Populated only when title.media_type = MEDIA_TYPE_BOOK.
  optional BookDetail book = 11;
}

message Transcode {
  int64 id = 1;
  MediaFormat media_format = 2;
  Quality quality = 3;
  optional int64 episode_id = 4;
  optional int32 season_number = 5;
  optional int32 episode_number = 6;
  optional string episode_name = 7;
  bool playable = 8;
  bool has_subtitles = 9;
  bool low_storage_transcode_available = 10;
  bool low_storage_transcode_requested = 11;
}

message CastMember {
  int32 tmdb_person_id = 1;
  string name = 2;
  optional string character_name = 3;
  optional string headshot_url = 4;
  int32 order = 5;
}

message Genre {
  int64 id = 1;
  string name = 2;
}

message Tag {
  int64 id = 1;
  string name = 2;
  Color color = 3;
}

message PlaybackProgress {
  int64 transcode_id = 1;
  PlaybackOffset position = 2;
  optional PlaybackOffset duration = 3;
  optional Timestamp updated_at = 4;
}

// ============================================================================
// TV
// ============================================================================

message Season {
  int32 season_number = 1;
  optional string name = 2;
  int32 episode_count = 3;
}

message Episode {
  int64 episode_id = 1;
  optional int64 transcode_id = 2;
  int32 season_number = 3;
  int32 episode_number = 4;
  optional string name = 5;
  Quality quality = 6;
  bool playable = 7;
  bool has_subtitles = 8;
  PlaybackOffset resume_position = 9;
  optional PlaybackOffset duration = 10;
  bool low_storage_transcode_available = 11;
  bool low_storage_transcode_requested = 12;
}

// ============================================================================
// Search
// ============================================================================

message SearchResult {
  SearchResultType result_type = 1;
  string name = 2;
  optional int64 title_id = 3;
  optional string poster_url = 4;
  optional int32 year = 5;
  Quality quality = 6;
  ContentRating content_rating = 7;
  optional int64 transcode_id = 8;
  MediaType media_type = 9;
  optional int32 tmdb_collection_id = 10;
  optional int32 tmdb_person_id = 11;
  optional string headshot_url = 12;
  optional int32 title_count = 13;
  optional int64 item_id = 14;
  // --- Book/audio additions. Clients fetch any images via ImageService
  // using the identifiers on this message (see images.proto for the
  // new IMAGE_TYPE_* values). No URLs are sent on these fields. ---
  optional int64 author_id = 15;
  optional int64 artist_id = 16;
  optional int64 track_id = 17;
  optional int64 album_title_id = 18;       // parent album for TRACK results
  optional string artist_name = 19;         // context line for ALBUM/TRACK
  optional string album_name = 20;          // context line for TRACK
  optional int64 media_item_id = 21;        // BOOK edition identifier
}

// ============================================================================
// Browse / Landing Pages
// ============================================================================

message ActorDetail {
  string name = 1;
  optional string headshot_url = 2;
  optional string biography = 3;
  optional CalendarDate birthday = 4;
  optional CalendarDate deathday = 5;
  optional string place_of_birth = 6;
  optional string known_for_department = 7;
  repeated OwnedCredit owned_titles = 8;
  repeated CreditEntry other_works = 9;
}

message OwnedCredit {
  Title title = 1;
  optional string character_name = 2;
}

message CreditEntry {
  int32 tmdb_id = 1;
  string title = 2;
  MediaType media_type = 3;
  optional string character_name = 4;
  optional int32 release_year = 5;
  optional string poster_url = 6;
  double popularity = 7;
  bool wished = 8;
}

message CollectionDetail {
  string name = 1;
  optional string poster_url = 2;
  repeated CollectionItem items = 3;
}

message CollectionItem {
  int32 tmdb_movie_id = 1;
  string name = 2;
  optional string poster_url = 3;
  optional int32 year = 4;
  bool owned = 5;
  bool playable = 6;
  optional int64 title_id = 7;
  Quality quality = 8;
  ContentRating content_rating = 9;
  optional int64 transcode_id = 10;
}

message TagDetail {
  string name = 1;
  Color color = 2;
  repeated Title titles = 3;
}

message GenreDetail {
  string name = 1;
  repeated Title titles = 2;
}

// ============================================================================
// List items (for collection/tag list endpoints)
// ============================================================================

message CollectionListItem {
  int32 tmdb_collection_id = 1;
  string name = 2;
  optional string poster_url = 3;
  int32 title_count = 4;
}

message TagListItem {
  int64 id = 1;
  string name = 2;
  Color color = 3;
  int32 title_count = 4;
}

// ============================================================================
// Home feed
// ============================================================================

message Carousel {
  string name = 1;
  repeated Title items = 2;
}

message MissingSeason {
  int64 title_id = 1;
  string title_name = 2;
  optional string poster_url = 3;
  optional int32 tmdb_id = 4;
  MediaType media_type = 5;
  repeated MissingSeasonEntry seasons = 6;
}

message MissingSeasonEntry {
  int32 season_number = 1;
  optional string name = 2;
  optional int32 episode_count = 3;
}

// ============================================================================
// Audio / Books
// ============================================================================
//
// All images referenced from this section are fetched via ImageService
// using the identifiers on these messages. No URLs cross the gRPC wire.

message Artist {
  int64 id = 1;
  string name = 2;
  optional string sort_name = 3;
  ArtistType artist_type = 4;
  optional string musicbrainz_artist_id = 5;
  optional int32 begin_year = 6;
  optional int32 end_year = 7;
  // Headshot: ImageService with IMAGE_TYPE_ARTIST_HEADSHOT + id.
}

message ArtistDetail {
  Artist artist = 1;
  optional string biography = 2;
  repeated Title owned_albums = 3;
  repeated DiscographyEntry other_works = 4;
  repeated ArtistMemberEntry members = 5;    // populated when artist_type = GROUP
  repeated ArtistMemberEntry member_of = 6;  // populated when artist_type = PERSON
}

message DiscographyEntry {
  // Use with IMAGE_TYPE_CAA_RELEASE_GROUP via ImageService.
  string musicbrainz_release_group_id = 1;
  string name = 2;
  optional int32 year = 3;
  ReleaseGroupType release_group_type = 4;
}

message ArtistMemberEntry {
  int64 artist_id = 1;
  string name = 2;
  optional int32 begin_year = 3;
  optional int32 end_year = 4;
}

message Track {
  int64 id = 1;
  int64 title_id = 2;                        // parent album
  int32 track_number = 3;
  int32 disc_number = 4;
  string name = 5;
  optional PlaybackOffset duration = 6;
  optional string musicbrainz_recording_id = 7;
  bool playable = 8;                         // audio file present on NAS
  repeated string track_artist_names = 9;    // when different from album credit
}

message Album {
  Title title = 1;
  repeated Artist album_artists = 2;
  repeated Track tracks = 3;
  optional int32 track_count = 4;
  optional PlaybackOffset total_duration = 5;
  optional string label = 6;
  optional string musicbrainz_release_group_id = 7;
  optional string musicbrainz_release_id = 8;
}

message Author {
  int64 id = 1;
  string name = 2;
  optional string biography = 3;
  optional string openlibrary_id = 4;
  optional string wikidata_id = 5;
  optional int32 birth_year = 6;
  optional int32 death_year = 7;
  // Headshot: ImageService with IMAGE_TYPE_AUTHOR_HEADSHOT + id.
}

message AuthorDetail {
  Author author = 1;
  repeated Title owned_books = 2;
  repeated BibliographyEntry other_works = 3;
}

message BibliographyEntry {
  // Use with IMAGE_TYPE_OPENLIBRARY_COVER via ImageService.
  string openlibrary_work_id = 1;
  string name = 2;
  optional int32 year = 3;
}

message BookDetail {
  repeated Author authors = 1;
  repeated BookEdition editions = 2;
  optional ReadingProgress reading_progress = 3;
}

message BookEdition {
  int64 media_item_id = 1;
  BookEditionFormat edition_format = 2;
  optional int64 file_size_bytes = 3;
  optional string storage_location = 4;      // physical shelf (non-digital only)
  bool downloadable = 5;                     // true for digital editions
}

// Progress on a music track or digital audiobook.
message ListeningProgress {
  optional int64 track_id = 1;               // set when listening to a music track
  optional int64 media_item_id = 2;          // set when listening to an audiobook
  PlaybackOffset position = 3;
  optional PlaybackOffset duration = 4;
  optional Timestamp updated_at = 5;
}

// Progress within an ebook. Locator is an EPUB CFI or "/page/N" for PDF.
message ReadingProgress {
  int64 media_item_id = 1;
  string locator = 2;
  optional double fraction = 3;              // 0.0–1.0, dimensionless
  optional Timestamp updated_at = 4;
}
