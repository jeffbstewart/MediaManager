// ============================================================================
// Unmatched-audio group triage
// ============================================================================

message UnmatchedAudioGroupListResponse {
  repeated UnmatchedAudioGroup groups = 1;
  int32 total_groups = 2;
  int32 total_files = 3;
}

message UnmatchedAudioGroup {
  // Stable derived id for referring to this group from client calls.
  // SHA-256 prefix of the sorted member row ids — when the row set
  // changes the id changes, which is fine: clients always re-list.
  string group_id = 1;
  repeated string dirs = 2;
  optional string dominant_album = 3;
  optional string dominant_album_artist = 4;
  optional string dominant_upc = 5;
  optional string dominant_mb_release_id = 6;
  optional string dominant_label = 7;
  optional string dominant_catalog_number = 8;
  repeated int32 disc_numbers = 9;
  int32 total_files = 10;
  // How many files carry a MUSICBRAINZ_TRACKID tag. When this equals
  // total_files, a matching MB release gives us the strongest possible
  // link signal; when zero, we fall back to (disc, track) positions.
  int32 recording_mbid_count = 11;
  repeated int64 file_ids = 12;
  repeated UnmatchedAudioGroupFile files = 13;
}

message UnmatchedAudioGroupFile {
  int64 id = 1;
  string file_path = 2;
  string file_name = 3;
  optional string parsed_title = 4;
  optional string parsed_track_artist = 5;
  optional int32 parsed_track_number = 6;
  optional int32 parsed_disc_number = 7;
  optional PlaybackOffset parsed_duration = 8;
  optional string parsed_mb_recording_id = 9;
}

message SearchMusicBrainzForUnmatchedAudioRequest {
  // File ids in the group. Server re-derives the group by computing
  // dominant values across these rows.
  repeated int64 unmatched_audio_ids = 1;
  // Optional free-text override when the parsed tags' artist+album
  // don't find the right MB record. "Artist - Album" is split on
  // " - "; otherwise the value is treated as an album name.
  optional string query_override = 2;
}

message SearchMusicBrainzForUnmatchedAudioResponse {
  string search_artist = 1;
  string search_album = 2;
  repeated MusicBrainzReleaseCandidate candidates = 3;
}

message MusicBrainzReleaseCandidate {
  string release_mbid = 1;
  optional string release_group_mbid = 2;
  string title = 3;
  string artist_credit = 4;
  optional int32 year = 5;
  optional string label = 6;
  optional string barcode = 7;
  int32 track_count = 8;
  int32 disc_count = 9;
  // True when every file's (disc, track) position exists on the
  // release. A false here means the scanner's current validator would
  // also reject this candidate — the admin sees the reason and picks
  // a different one.
  bool accommodates_files = 10;
  // Count of the group's files whose parsed_mb_recording_id appears
  // on this release. Non-zero = high confidence; = total_files means
  // gold-standard match (new ripper populates recording MBIDs).
  int32 recording_mbid_coverage = 11;
}

message LinkUnmatchedAudioAlbumToReleaseRequest {
  repeated int64 unmatched_audio_ids = 1;
  string release_mbid = 2;
}

message LinkUnmatchedAudioAlbumManualRequest {
  repeated int64 unmatched_audio_ids = 1;
  // No admin overrides by design — the ripper already wrote album
  // name, artist, track name, track number, disc number, duration
  // into the files. Server derives everything from file tags.
}

message LinkUnmatchedAudioAlbumResponse {
  int64 title_id = 1;
  string title_name = 2;
  int32 linked = 3;
  repeated LinkUnmatchedAudioAlbumFailure failed = 4;
}

message LinkUnmatchedAudioAlbumFailure {
  string file_path = 1;
  string reason = 2;
}

// ============================================================================
// Image cache migration verifier (phase 4a)
// ============================================================================

message VerifyFirstPartyImageMigrationResponse {
  FirstPartyCategoryAudit ownership_photos = 1;
  FirstPartyCategoryAudit local_images = 2;
  // True when every category reports verified == total and every failure
  // counter is zero. Phase 4b deletion is safe to consider only when this
  // is true.
  bool safe_to_delete_old_layout = 3;
  Timestamp audited_at = 4;
}

message FirstPartyCategoryAudit {
  // Total rows in the driving table (ownership_photo or local_image).
  int32 total_rows = 1;
  // Rows whose legacy file is missing — nothing to verify against, not
  // necessarily broken (may have been intentionally deleted from disk).
  int32 legacy_missing = 2;
  // Rows where both legacy + new layout exist with matching bytes AND
  // a parseable sidecar sits next to the new file. The happy path.
  int32 verified = 3;
  // Rows where the legacy file exists but no new-layout copy was found.
  int32 missing_new_copy = 4;
  // Rows where both copies exist but file sizes (treated as a
  // byte-identity proxy; the copy updater does a byte-for-byte copy)
  // disagree.
  int32 mismatched_bytes = 5;
  // Rows where the new-layout copy exists but no sidecar sits next to it.
  int32 missing_sidecar = 6;
  // Rows where a sidecar exists but doesn't parse as valid JSON.
  int32 invalid_sidecar = 7;

  // Up to SAMPLE_LIMIT example file paths per failure bucket so the admin
  // can spot-check without running a separate tool.
  repeated string sample_missing_new_copy = 10;
  repeated string sample_mismatched_bytes = 11;
  repeated string sample_missing_sidecar = 12;
  repeated string sample_invalid_sidecar = 13;
}
