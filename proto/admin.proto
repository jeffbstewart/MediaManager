syntax = "proto3";

package mediamanager;

option java_package = "net.stewart.mediamanager.grpc";
option java_multiple_files = true;
option swift_prefix = "MM";

import "common.proto";
import "time.proto";

// Admin-only operations. All RPCs require access_level >= 2.
service AdminService {
  // --- Transcode Monitoring ---
  rpc GetTranscodeStatus(Empty) returns (TranscodeStatusResponse);
  rpc GetBuddyStatus(Empty) returns (BuddyStatusResponse);
  rpc ScanNas(Empty) returns (Empty);
  rpc ClearFailures(Empty) returns (ClearFailuresResponse);

  // Server-streaming: live transcode progress pushed to client.
  rpc WatchTranscodeProgress(Empty) returns (stream TranscodeProgressEvent);

  // Server-streaming: initial snapshot + live delta updates.
  rpc MonitorTranscodeStatus(Empty) returns (stream TranscodeStatusUpdate);

  // --- Barcode Scanning ---
  rpc SubmitBarcode(SubmitBarcodeRequest) returns (SubmitBarcodeResponse);
  rpc ListRecentScans(Empty) returns (RecentScansResponse);

  // Server-streaming: initial snapshot of recent scans + live progress updates.
  rpc MonitorScanProgress(Empty) returns (stream ScanProgressUpdate);

  // --- Scan Detail ---
  rpc GetScanDetail(ScanIdRequest) returns (ScanDetailResponse);
  rpc AssignTmdb(AssignTmdbRequest) returns (AssignTmdbResponse);
  rpc UpdatePurchaseInfo(UpdatePurchaseInfoRequest) returns (Empty);
  rpc UploadOwnershipPhoto(UploadOwnershipPhotoRequest) returns (UploadOwnershipPhotoResponse);
  rpc DeleteOwnershipPhoto(DeleteOwnershipPhotoRequest) returns (Empty);

  // --- Add Title ---
  // Create a title + media item from a TMDB search result.
  rpc AddTitle(AddTitleRequest) returns (AddTitleResponse);

  // --- Transcode Management ---
  rpc ListLinkedTranscodes(PaginationRequest) returns (LinkedTranscodeResponse);
  rpc UnlinkTranscode(TranscodeIdRequest) returns (Empty);
  rpc ListUnmatchedFiles(Empty) returns (UnmatchedResponse);
  rpc AcceptUnmatched(UnmatchedIdRequest) returns (AcceptUnmatchedResponse);
  rpc IgnoreUnmatched(UnmatchedIdRequest) returns (Empty);
  rpc LinkUnmatched(LinkUnmatchedRequest) returns (AcceptUnmatchedResponse);

  // --- Data Quality ---
  rpc ListDataQuality(DataQualityRequest) returns (DataQualityResponse);
  rpc ReEnrich(TitleIdRequest) returns (Empty);
  rpc DeleteTitle(TitleIdRequest) returns (Empty);
  rpc UpdateTitleMetadata(UpdateTitleMetadataRequest) returns (Empty);

  // --- Purchase Wishes ---
  rpc ListPurchaseWishes(Empty) returns (PurchaseWishListResponse);
  rpc UpdatePurchaseWishStatus(UpdatePurchaseWishStatusRequest) returns (Empty);

  // --- Rip Backlog ---
  rpc ListRipBacklog(PaginationRequest) returns (RipBacklogResponse);

  // --- Tags ---
  rpc ListTags(Empty) returns (AdminTagListResponse);
  rpc CreateTag(CreateTagRequest) returns (CreateTagResponse);
  rpc UpdateTag(UpdateTagRequest) returns (Empty);
  rpc DeleteTag(TagIdRequest) returns (Empty);

  // --- User Management ---
  rpc ListUsers(Empty) returns (UserListResponse);
  rpc CreateUser(CreateUserRequest) returns (CreateUserResponse);
  rpc UpdateUserRole(UpdateUserRoleRequest) returns (Empty);
  rpc UpdateUserRatingCeiling(UpdateUserRatingCeilingRequest) returns (Empty);
  rpc UnlockUser(UserIdRequest) returns (Empty);
  rpc ForcePasswordChange(UserIdRequest) returns (Empty);
  rpc ResetPassword(ResetPasswordRequest) returns (Empty);
  rpc DeleteUser(UserIdRequest) returns (Empty);

  // --- Settings ---
  rpc GetSettings(Empty) returns (SettingsResponse);
  rpc UpdateSetting(UpdateSettingRequest) returns (Empty);

  // --- Camera Admin ---
  rpc ListAdminCameras(Empty) returns (AdminCameraListResponse);
  rpc CreateCamera(CreateCameraRequest) returns (AdminCamera);
  rpc UpdateCamera(UpdateCameraRequest) returns (AdminCamera);
  rpc DeleteCamera(CameraIdRequest) returns (Empty);
  rpc ReorderCameras(ReorderCamerasRequest) returns (Empty);

  // --- Amazon Import ---
  rpc ImportAmazonOrders(ImportAmazonOrdersRequest) returns (ImportAmazonOrdersResponse);
  rpc SearchAmazonOrders(SearchAmazonOrdersRequest) returns (SearchAmazonOrdersResponse);
  rpc LinkAmazonOrder(LinkAmazonOrderRequest) returns (Empty);
  rpc UnlinkAmazonOrder(AmazonOrderIdRequest) returns (Empty);
  rpc GetAmazonOrderSummary(Empty) returns (AmazonOrderSummaryResponse);

  // --- Expand Multi-Packs ---
  rpc ListPendingExpansions(Empty) returns (PendingExpansionsResponse);
  rpc GetExpansionDetail(MediaItemIdRequest) returns (ExpansionDetailResponse);
  rpc AddTitleToExpansion(AddTitleToExpansionRequest) returns (AddTitleToExpansionResponse);
  rpc RemoveTitleFromExpansion(RemoveTitleFromExpansionRequest) returns (Empty);
  rpc MarkExpanded(MediaItemIdRequest) returns (Empty);
  rpc MarkNotMultiPack(MediaItemIdRequest) returns (Empty);

  // --- Valuation ---
  rpc ListValuations(ValuationRequest) returns (ValuationResponse);
  rpc UpdateMediaItem(UpdateMediaItemRequest) returns (Empty);
  rpc TriggerKeepaLookup(MediaItemIdRequest) returns (Empty);

  // --- Document Ownership ---
  rpc ListUndocumentedItems(PaginationRequest) returns (UndocumentedItemsResponse);

  // --- Family Members ---
  rpc ListFamilyMembers(Empty) returns (FamilyMemberListResponse);
  rpc CreateFamilyMember(CreateFamilyMemberRequest) returns (FamilyMemberResponse);
  rpc UpdateFamilyMember(UpdateFamilyMemberRequest) returns (Empty);
  rpc DeleteFamilyMember(FamilyMemberIdRequest) returns (Empty);

  // --- Live TV Settings ---
  rpc GetLiveTvSettings(Empty) returns (LiveTvSettingsResponse);
  rpc UpdateLiveTvSettings(UpdateLiveTvSettingsRequest) returns (Empty);
  rpc ListTuners(Empty) returns (TunerListResponse);
  rpc AddTuner(AddTunerRequest) returns (TunerResponse);
  rpc UpdateTuner(UpdateTunerRequest) returns (Empty);
  rpc DeleteTuner(TunerIdRequest) returns (Empty);
  rpc RefreshTunerChannels(TunerIdRequest) returns (RefreshChannelsResponse);
  rpc ListAdminChannels(TunerIdRequest) returns (AdminChannelListResponse);
  rpc UpdateChannel(UpdateChannelRequest) returns (Empty);

  // --- Inventory Report ---
  rpc GenerateInventoryReport(InventoryReportRequest) returns (InventoryReportResponse);
}

// --- ID Requests ---

message UnmatchedIdRequest {
  int64 unmatched_id = 1;
}

message UserIdRequest {
  int64 user_id = 1;
}

// --- Transcode Status ---

enum LeaseStatus {
  LEASE_STATUS_UNKNOWN = 0;
  LEASE_STATUS_CLAIMED = 1;
  LEASE_STATUS_IN_PROGRESS = 2;
  LEASE_STATUS_COMPLETED = 3;
  LEASE_STATUS_FAILED = 4;
  LEASE_STATUS_EXPIRED = 5;
}

enum LeaseType {
  LEASE_TYPE_UNKNOWN = 0;
  LEASE_TYPE_TRANSCODE = 1;
  LEASE_TYPE_THUMBNAILS = 2;
  LEASE_TYPE_SUBTITLES = 3;
  LEASE_TYPE_CHAPTERS = 4;
  LEASE_TYPE_LOW_STORAGE_TRANSCODE = 5;
}

message TranscodeStatusResponse {
  int32 pending_transcode = 1;
  int32 pending_thumbnails = 2;
  int32 pending_subtitles = 3;
  int32 pending_chapters = 4;
  int32 pending_low_storage = 5;
  int32 poison_pills = 6;
  repeated ActiveLease active_leases = 7;
}

message ActiveLease {
  int64 lease_id = 1;
  string buddy_name = 2;
  string relative_path = 3;
  LeaseType lease_type = 4;
  LeaseStatus status = 5;
  int32 progress_percent = 6;
  optional string encoder = 7;
  optional Timestamp claimed_at = 8;
  optional Timestamp expires_at = 9;
}

message BuddyStatusResponse {
  repeated BuddyInfo buddies = 1;
  repeated RecentLease recent_leases = 2;
}

message BuddyInfo {
  string name = 1;
  int32 active_leases = 2;
  optional Timestamp last_seen = 3;
}

message RecentLease {
  int64 lease_id = 1;
  string buddy_name = 2;
  string relative_path = 3;
  LeaseType lease_type = 4;
  LeaseStatus status = 5;
  int32 progress_percent = 6;
  optional Timestamp completed_at = 7;
}

message ClearFailuresResponse {
  int32 cleared = 1;
}

// --- Live Transcode Progress (server-streaming) ---

message TranscodeProgressEvent {
  int64 lease_id = 1;
  string buddy_name = 2;
  string relative_path = 3;
  LeaseStatus status = 4;
  int32 progress_percent = 5;
  optional string encoder = 6;
  LeaseType lease_type = 7;
}

// --- Transcode Status Monitor (server-streaming with initial snapshot) ---

message TranscodeStatusUpdate {
  oneof update {
    TranscodeStatusResponse snapshot = 1;
    TranscodeProgressEvent event = 2;
  }
}

// --- Barcode Scanning ---

enum ScanStatus {
  SCAN_STATUS_UNKNOWN = 0;
  SCAN_STATUS_SUBMITTED = 1;
  SCAN_STATUS_UPC_FOUND = 2;
  SCAN_STATUS_UPC_NOT_FOUND = 3;
  SCAN_STATUS_ENRICHING = 4;
  SCAN_STATUS_ENRICHED = 5;
  SCAN_STATUS_ENRICHMENT_FAILED = 6;
  SCAN_STATUS_NO_MATCH = 7;
}

enum SubmitBarcodeResult {
  SUBMIT_BARCODE_RESULT_UNKNOWN = 0;
  SUBMIT_BARCODE_RESULT_CREATED = 1;
  SUBMIT_BARCODE_RESULT_DUPLICATE = 2;
  SUBMIT_BARCODE_RESULT_INVALID = 3;
}

message SubmitBarcodeRequest {
  string upc = 1;
}

message SubmitBarcodeResponse {
  SubmitBarcodeResult result = 1;
  int64 scan_id = 2;
  optional string title_name = 3;
  optional string message = 4;
}

message RecentScan {
  int64 scan_id = 1;
  string upc = 2;
  ScanStatus status = 3;
  optional string title_name = 4;
  optional string poster_url = 5;
  optional int64 title_id = 6;
  optional Timestamp scanned_at = 7;
}

message RecentScansResponse {
  repeated RecentScan scans = 1;
}

message ScanProgressUpdate {
  oneof update {
    RecentScansResponse snapshot = 1;
    ScanProgressEvent event = 2;
  }
}

message ScanProgressEvent {
  int64 scan_id = 1;
  string upc = 2;
  ScanStatus status = 3;
  optional string title_name = 4;
  optional string poster_url = 5;
  optional int64 title_id = 6;
}

// --- Scan Detail ---

message ScanIdRequest {
  int64 scan_id = 1;
}

message ScanDetailResponse {
  int64 scan_id = 1;
  string upc = 2;
  ScanStatus status = 3;
  optional string product_name = 4;
  MediaFormat media_format = 5;
  optional int64 title_id = 6;
  optional string title_name = 7;
  optional string poster_url = 8;
  optional int32 release_year = 9;
  optional string description = 10;
  EnrichmentStatus enrichment_status = 11;
  optional string purchase_place = 12;
  optional CalendarDate purchase_date = 13;
  optional double purchase_price = 14;
  repeated OwnershipPhotoInfo photos = 15;
}

message OwnershipPhotoInfo {
  string photo_id = 1;
  string url = 2;
  optional Timestamp captured_at = 3;
}

message AssignTmdbRequest {
  int64 title_id = 1;
  int32 tmdb_id = 2;
  MediaType media_type = 3;
}

message AssignTmdbResponse {
  bool merged = 1;
  optional string merged_title_name = 2;
}

message AddTitleRequest {
  int32 tmdb_id = 1;
  MediaType media_type = 2;
  MediaFormat media_format = 3;
  // For TV shows: which seasons to create (e.g., "1,2,3" or "1-3").
  // Omit for movies.
  optional string seasons = 4;
}

message AddTitleResponse {
  int64 title_id = 1;
  string title_name = 2;
  bool already_existed = 3;
}

message UpdatePurchaseInfoRequest {
  int64 scan_id = 1;
  optional string purchase_place = 2;
  optional CalendarDate purchase_date = 3;
  optional double purchase_price = 4;
}

message UploadOwnershipPhotoRequest {
  int64 scan_id = 1;
  bytes photo_data = 2;
  string content_type = 3;
}

message UploadOwnershipPhotoResponse {
  string photo_id = 1;
}

message DeleteOwnershipPhotoRequest {
  string photo_id = 1;
}

// --- Linked Transcodes ---

message LinkedTranscodeResponse {
  repeated LinkedTranscodeItem transcodes = 1;
  PaginationInfo pagination = 2;
}

enum MatchMethod {
  MATCH_METHOD_UNKNOWN = 0;
  MATCH_METHOD_AUTO_EXACT = 1;
  MATCH_METHOD_AUTO_NORMALIZED = 2;
  MATCH_METHOD_MANUAL = 3;
}

message LinkedTranscodeItem {
  int64 transcode_id = 1;
  string title_name = 2;
  int64 title_id = 3;
  optional string file_path = 4;
  MediaFormat media_format = 5;
  MatchMethod match_method = 6;
  bool file_exists = 7;
  bool high_quality_transcode_available = 8;
  bool low_storage_transcode_available = 9;
}

// --- Unmatched Files ---

message UnmatchedResponse {
  repeated UnmatchedFile unmatched = 1;
  int32 total = 2;
}

message UnmatchedFile {
  int64 id = 1;
  string file_path = 2;
  optional string suggested_title = 3;
  optional int64 suggested_title_id = 4;
  optional double match_score = 5;
}

message LinkUnmatchedRequest {
  int64 unmatched_id = 1;
  int64 title_id = 2;
}

message AcceptUnmatchedResponse {
  bool linked = 1;
  optional string title_name = 2;
}

// --- Data Quality ---

enum EnrichmentStatus {
  ENRICHMENT_STATUS_UNKNOWN = 0;
  ENRICHMENT_STATUS_PENDING = 1;
  ENRICHMENT_STATUS_ENRICHED = 2;
  ENRICHMENT_STATUS_SKIPPED = 3;
  ENRICHMENT_STATUS_FAILED = 4;
  ENRICHMENT_STATUS_REASSIGNMENT_REQUESTED = 5;
  ENRICHMENT_STATUS_ABANDONED = 6;
}

enum DataQualityIssue {
  DATA_QUALITY_ISSUE_UNKNOWN = 0;
  DATA_QUALITY_ISSUE_NO_POSTER = 1;
  DATA_QUALITY_ISSUE_NO_DESCRIPTION = 2;
  DATA_QUALITY_ISSUE_NO_TMDB_ID = 3;
  DATA_QUALITY_ISSUE_NO_YEAR = 4;
  DATA_QUALITY_ISSUE_NO_CONTENT_RATING = 5;
  DATA_QUALITY_ISSUE_NO_BACKDROP = 6;
  DATA_QUALITY_ISSUE_NO_CAST = 7;
  DATA_QUALITY_ISSUE_NO_GENRES = 8;
  DATA_QUALITY_ISSUE_ENRICHMENT_FAILED = 9;
  DATA_QUALITY_ISSUE_ENRICHMENT_ABANDONED = 10;
}

message DataQualityRequest {
  int32 page = 1;
  int32 limit = 2;
  optional EnrichmentStatus status = 3;
}

message DataQualityResponse {
  repeated DataQualityItem items = 1;
  PaginationInfo pagination = 2;
}

message DataQualityItem {
  int64 title_id = 1;
  string name = 2;
  EnrichmentStatus enrichment_status = 3;
  MediaType media_type = 4;
  optional string poster_url = 5;
  repeated DataQualityIssue issues = 6;
}

message UpdateTitleMetadataRequest {
  int64 title_id = 1;
  optional string name = 2;
  optional string description = 3;
  optional int32 release_year = 4;
}

// --- Purchase Wishes ---

message PurchaseWishListResponse {
  repeated PurchaseWish wishes = 1;
}

message PurchaseWish {
  int32 tmdb_id = 1;
  MediaType media_type = 2;
  string title = 3;
  optional string poster_url = 4;
  optional int32 release_year = 5;
  int32 vote_count = 6;
  repeated string voters = 7;
  AcquisitionStatus acquisition_status = 8;
  optional int32 season_number = 9;
  WishLifecycleStage lifecycle_stage = 10;
  optional int64 title_id = 11;
}

message UpdatePurchaseWishStatusRequest {
  int32 tmdb_id = 1;
  MediaType media_type = 2;
  AcquisitionStatus status = 3;
  optional int32 season_number = 4;
}

// --- Rip Backlog ---

message RipBacklogResponse {
  repeated RipBacklogItem items = 1;
  PaginationInfo pagination = 2;
}

message RipBacklogItem {
  int64 title_id = 1;
  string name = 2;
  optional string poster_url = 3;
  MediaType media_type = 4;
  optional int32 year = 5;
  int32 wish_count = 6;
}

// --- Tags ---

message AdminTagListResponse {
  repeated AdminTagListItem tags = 1;
}

message AdminTagListItem {
  int64 id = 1;
  string name = 2;
  Color color = 3;
  int32 title_count = 4;
}

message CreateTagRequest {
  string name = 1;
  Color color = 2;
}

enum CreateTagResult {
  CREATE_TAG_RESULT_UNKNOWN = 0;
  CREATE_TAG_RESULT_CREATED = 1;
  CREATE_TAG_RESULT_DUPLICATE = 2;   // name collision; id points to the existing tag
}

message CreateTagResponse {
  CreateTagResult result = 1;
  int64 id = 2;   // new tag id on CREATED, existing tag id on DUPLICATE
}

message UpdateTagRequest {
  int64 tag_id = 1;
  optional string name = 2;
  optional Color color = 3;
}

// --- User Management ---

message UserListResponse {
  repeated UserInfo users = 1;
}

message UserInfo {
  int64 id = 1;
  string username = 2;
  optional string display_name = 3;
  AccessLevel access_level = 4;
  bool locked = 5;
  bool must_change_password = 6;
  optional RatingLevel rating_ceiling = 7;
}

message CreateUserRequest {
  string username = 1;
  string password = 2;
  optional string display_name = 3;
  bool force_change = 4;
}

message CreateUserResponse {
  int64 id = 1;
  string username = 2;
}

message UpdateUserRoleRequest {
  int64 user_id = 1;
  AccessLevel access_level = 2;
}

message UpdateUserRatingCeilingRequest {
  int64 user_id = 1;
  optional RatingLevel ceiling = 2;  // omit to remove ceiling (unrestricted)
}

message ResetPasswordRequest {
  int64 user_id = 1;
  string new_password = 2;
  bool force_change = 3;
}

// --- Settings ---

// Enumerated setting keys. Each corresponds to an app_config row in the database.
enum SettingKey {
  SETTING_KEY_UNKNOWN = 0;

  // Paths
  SETTING_KEY_NAS_ROOT_PATH = 1;
  SETTING_KEY_FFMPEG_PATH = 2;
  SETTING_KEY_GO2RTC_PATH = 3;

  // Networking
  SETTING_KEY_ROKU_BASE_URL = 4;
  SETTING_KEY_GO2RTC_API_PORT = 5;

  // Feature toggles
  SETTING_KEY_PERSONAL_VIDEO_ENABLED = 6;
  SETTING_KEY_FOR_MOBILE_ENABLED = 7;
  SETTING_KEY_KEEPA_ENABLED = 8;

  // Personal video
  SETTING_KEY_PERSONAL_VIDEO_NAS_DIR = 9;

  // Transcode buddy
  SETTING_KEY_BUDDY_LEASE_DURATION_MINUTES = 10;

  // Keepa (Amazon price tracking)
  SETTING_KEY_KEEPA_API_KEY = 11;
  SETTING_KEY_KEEPA_TOKENS_PER_MINUTE = 12;

  // Live TV
  SETTING_KEY_LIVE_TV_MIN_RATING = 13;
  SETTING_KEY_LIVE_TV_MAX_STREAMS = 14;
  SETTING_KEY_LIVE_TV_IDLE_TIMEOUT_SECONDS = 15;
  SETTING_KEY_PRIVACY_POLICY_URL = 16;
  SETTING_KEY_PRIVACY_POLICY_VERSION = 17;
  SETTING_KEY_IOS_TERMS_OF_USE_URL = 18;
  SETTING_KEY_IOS_TERMS_OF_USE_VERSION = 19;
  SETTING_KEY_WEB_TERMS_OF_USE_URL = 20;
  SETTING_KEY_WEB_TERMS_OF_USE_VERSION = 21;
}

message Setting {
  SettingKey key = 1;
  string value = 2;
}

message SettingsResponse {
  repeated Setting settings = 1;
}

message UpdateSettingRequest {
  SettingKey key = 1;
  string value = 2;
}

// --- Camera Admin ---

message CameraIdRequest {
  int64 camera_id = 1;
}

message AdminCamera {
  int64 id = 1;
  string name = 2;
  string rtsp_url = 3;         // credentials redacted as ***:***
  string snapshot_url = 4;     // credentials redacted
  string stream_name = 5;     // go2rtc identifier
  bool enabled = 6;
  int32 display_order = 7;
}

message AdminCameraListResponse {
  repeated AdminCamera cameras = 1;
}

message CreateCameraRequest {
  string name = 1;
  string rtsp_url = 2;        // full URL with credentials
  string snapshot_url = 3;
  optional string stream_name = 4;
  bool enabled = 5;
}

message UpdateCameraRequest {
  int64 camera_id = 1;
  string name = 2;
  string rtsp_url = 3;        // redacted = preserve, new = replace
  string snapshot_url = 4;
  string stream_name = 5;
  bool enabled = 6;
}

message ReorderCamerasRequest {
  repeated int64 camera_ids = 1;
}

// --- Amazon Import Messages ---

message ImportAmazonOrdersRequest {
  bytes csv_data = 1;
  string filename = 2;  // hint for ZIP vs CSV detection
}

message ImportAmazonOrdersResponse {
  int32 imported = 1;
  int32 skipped = 2;
  optional string error = 3;
}

message SearchAmazonOrdersRequest {
  optional string query = 1;
  bool media_only = 2;
  bool unlinked_only = 3;
  bool hide_cancelled = 4;
  int32 limit = 5;
}

message AmazonOrder {
  int64 id = 1;
  string order_id = 2;
  string asin = 3;
  string product_name = 4;
  optional string order_date = 5;     // ISO date string
  optional double unit_price = 6;
  optional string product_condition = 7;
  optional string order_status = 8;
  optional int64 linked_media_item_id = 9;
  optional string linked_title_name = 10;
}

message SearchAmazonOrdersResponse {
  repeated AmazonOrder orders = 1;
}

message LinkAmazonOrderRequest {
  int64 amazon_order_id = 1;
  int64 media_item_id = 2;
}

message AmazonOrderIdRequest {
  int64 amazon_order_id = 1;
}

message AmazonOrderSummaryResponse {
  int32 total = 1;
  int32 media_related = 2;
  int32 linked = 3;
}

message MediaItemIdRequest {
  int64 media_item_id = 1;
}

// --- Expand Multi-Pack Messages ---

message PendingExpansionItem {
  int64 media_item_id = 1;
  optional string upc = 2;
  string product_name = 3;
  MediaFormat media_format = 4;
  int32 estimated_title_count = 5;
}

message PendingExpansionsResponse {
  repeated PendingExpansionItem items = 1;
}

message ExpansionLinkedTitle {
  int64 join_id = 1;
  int64 title_id = 2;
  string name = 3;
  optional int32 release_year = 4;
  optional string poster_path = 5;
  int32 disc_number = 6;
}

message ExpansionDetailResponse {
  int64 media_item_id = 1;
  string product_name = 2;
  MediaFormat media_format = 3;
  int32 estimated_title_count = 4;
  repeated ExpansionLinkedTitle linked_titles = 5;
}

message AddTitleToExpansionRequest {
  int64 media_item_id = 1;
  int32 tmdb_id = 2;
  MediaType media_type = 3;
}

message AddTitleToExpansionResponse {
  int64 title_id = 1;
  string title_name = 2;
  int32 disc_number = 3;
  bool already_existed = 4;
}

message RemoveTitleFromExpansionRequest {
  int64 media_item_id = 1;
  int64 title_id = 2;
}

// --- Valuation Messages ---

message ValuationRequest {
  int32 page = 1;
  int32 page_size = 2;
  optional string query = 3;
  bool unpriced_only = 4;
}

message ValuationItem {
  int64 media_item_id = 1;
  optional string upc = 2;
  string product_name = 3;
  repeated string title_names = 4;
  MediaFormat media_format = 5;
  optional string purchase_place = 6;
  optional string purchase_date = 7;
  optional double purchase_price = 8;
  optional double replacement_value = 9;
  optional string replacement_value_date = 10;
  optional string override_asin = 11;
  int32 photo_count = 12;
}

message ValuationResponse {
  repeated ValuationItem items = 1;
  int32 total_count = 2;
  int32 total_items = 3;
  double total_purchase_value = 4;
  double total_replacement_value = 5;
}

message UpdateMediaItemRequest {
  int64 media_item_id = 1;
  optional string purchase_place = 2;
  optional string purchase_date = 3;    // ISO date
  optional double purchase_price = 4;
  optional double replacement_value = 5;
  optional string override_asin = 6;
}

// --- Document Ownership Messages ---

message UndocumentedItem {
  int64 media_item_id = 1;
  optional string upc = 2;
  string product_name = 3;
  repeated string title_names = 4;
  MediaFormat media_format = 5;
}

message UndocumentedItemsResponse {
  repeated UndocumentedItem items = 1;
  int32 total_count = 2;
}

// --- Family Member Messages ---

message FamilyMemberIdRequest {
  int64 family_member_id = 1;
}

message FamilyMemberResponse {
  int64 id = 1;
  string name = 2;
  optional string birth_date = 3;
  optional string notes = 4;
  int32 video_count = 5;
}

message FamilyMemberListResponse {
  repeated FamilyMemberResponse members = 1;
}

message CreateFamilyMemberRequest {
  string name = 1;
  optional string birth_date = 2;
  optional string notes = 3;
}

message UpdateFamilyMemberRequest {
  int64 family_member_id = 1;
  string name = 2;
  optional string birth_date = 3;
  optional string notes = 4;
}

// --- Live TV Settings Messages ---

message LiveTvSettingsResponse {
  optional string min_content_rating = 1;
  int32 max_streams = 2;
  int32 idle_timeout_seconds = 3;
  int32 active_tuner_count = 4;
  int32 active_stream_count = 5;
}

message UpdateLiveTvSettingsRequest {
  optional string min_content_rating = 1;
  int32 max_streams = 2;
  int32 idle_timeout_seconds = 3;
}

message TunerIdRequest {
  int64 tuner_id = 1;
}

message TunerResponse {
  int64 id = 1;
  string name = 2;
  string ip_address = 3;
  optional string device_id = 4;
  optional string model_number = 5;
  int32 tuner_count = 6;
  bool enabled = 7;
  int32 channel_count = 8;
}

message TunerListResponse {
  repeated TunerResponse tuners = 1;
}

message AddTunerRequest {
  string ip_address = 1;
  optional string name = 2;
}

message UpdateTunerRequest {
  int64 tuner_id = 1;
  string name = 2;
  bool enabled = 3;
}

message RefreshChannelsResponse {
  int32 channels_found = 1;
  int32 channels_added = 2;
}

message AdminChannelResponse {
  int64 id = 1;
  string guide_number = 2;
  string guide_name = 3;
  optional string network_affiliation = 4;
  int32 reception_quality = 5;
  bool enabled = 6;
  int32 display_order = 7;
}

message AdminChannelListResponse {
  repeated AdminChannelResponse channels = 1;
}

message UpdateChannelRequest {
  int64 channel_id = 1;
  optional string network_affiliation = 2;
  int32 reception_quality = 3;
  bool enabled = 4;
}

// --- Inventory Report Messages ---

message InventoryReportRequest {
  bool include_photos = 1;
}

message InventoryReportRow {
  string title_names = 1;
  string media_format = 2;
  optional string upc = 3;
  optional string purchase_date = 4;
  optional string purchase_place = 5;
  optional double purchase_price = 6;
  optional double replacement_value = 7;
  optional string replacement_value_date = 8;
  int32 photo_count = 9;
}

message InventoryReportResponse {
  repeated InventoryReportRow rows = 1;
  int32 total_items = 2;
  double total_purchase_value = 3;
  double total_replacement_value = 4;
}
