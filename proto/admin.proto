// Successor to AssignTmdbRequest — supports OpenLibrary + MusicBrainz.
// AssignTmdbRequest stays for Android TV back-compat.
enum ExternalIdentifierKind {
  EXTERNAL_IDENTIFIER_KIND_UNKNOWN = 0;
  EXTERNAL_IDENTIFIER_KIND_TMDB = 1;
  EXTERNAL_IDENTIFIER_KIND_OPENLIBRARY_WORK = 2;
  EXTERNAL_IDENTIFIER_KIND_MUSICBRAINZ_RELEASE_GROUP = 3;
  EXTERNAL_IDENTIFIER_KIND_MUSICBRAINZ_RELEASE = 4;
}

message AssignExternalIdentifierRequest {
  int64 title_id = 1;
  ExternalIdentifierKind kind = 2;
  // Server validates value-shape against kind (int for TMDB,
  // OL work regex for OPENLIBRARY_WORK, MBID regex for MB kinds).
  string value = 3;
  // Required when kind = TMDB to disambiguate movie/TV namespace.
  MediaType media_type = 4;
}

message AssignExternalIdentifierResponse {
  bool merged = 1;
  optional string merged_title_name = 2;
}

enum EnrichmentAgent {
  ENRICHMENT_AGENT_UNKNOWN = 0;
  ENRICHMENT_AGENT_TMDB = 1;
  ENRICHMENT_AGENT_OPENLIBRARY = 2;
  ENRICHMENT_AGENT_MUSICBRAINZ = 3;
  ENRICHMENT_AGENT_AUTHOR_HEADSHOT = 4;
  ENRICHMENT_AGENT_ARTIST_HEADSHOT = 5;
  ENRICHMENT_AGENT_ARTIST_PERSONNEL = 6;
}

message ReEnrichWithAgentRequest {
  int64 title_id = 1;
  EnrichmentAgent agent = 2;
}

